<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Карта мира Возрождения Рыцарства</title>
		<link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico">
		<link rel="stylesheet" type="text/css" href="style/leaflet.css" />
		<link rel="stylesheet" type="text/css" href="style/map.css" />
		<link rel="stylesheet" type="text/css" href="style/leaflet.measure.css" />
		<link rel="stylesheet" type="text/css" href="style/Leaflet.GraphicScale.min.css" />
        <script src="js/leaflet.js" type="text/javascript"></script>
		<script src="js/leaflet-hash.js" type="text/javascript"></script>
		<script src="js/leaflet.measure.js" type="text/javascript"></script>
		<script src="js/Leaflet.GraphicScale.min.js" type="text/javascript"></script>
		<script src="js/Leaflet.GraphicScale.RoCGraphicScale.js" type="text/javascript"></script>
    </head>
    <body>
		 <div id="map"></div>
		 <script>
			const width_px = 4833;
			const height_px = 4101;
			const km_per_px = 4;
			const width_km = width_px * km_per_px;
			const height_km = height_px * km_per_px;
			const mapcenter = [width_km / 2, height_km / 2];
			const factor = 1 / 1000;
			
			const image_url = './images/RoC_map_4.0.webp';
			
			const MapEvents = () => {
				useMapEvents({
				  click(e) {
					// setState your coords here
					// coords exist in "e.latlng.lat" and "e.latlng.lng"
					console.log(e.latlng.lat + ' ' + e.latlng.lng);
					//console.log(e.latlng.lng);
				  },
				});
				return false;
			}
			
			var yx = L.latLng;

			var xy = function (x, y) {
			  if (L.Util.isArray(x)) { // When doing xy([x, y]);
				return yx(x[1], x[0]);
			  }
			  return yx(y, x); // When doing xy(x, y);
			}
			
			// calculate Euclidean distance:
			var getDistance = function (pointA, pointB) {
			  var xA = pointA.lng
			  var yA = pointA.lat
			  var xB = pointB.lng
			  var yB = pointB.lat

			  var distance = Math.sqrt(Math.pow((xB - xA), 2) + Math.pow((yB - yA), 2))
			  return distance
			}
			//console.log('getDistance(hobbiton, minasMorgul): ' + getDistance(hobbiton, minasMorgul) + 'km')

			// переопределение
			
			L.CRS.pr = L.extend({}, L.CRS.Simple, {
			  projection: L.Projection.LonLat,
			  transformation: new L.Transformation(factor, 0, factor, 0),
			  scale: function(zoom) {
				return Math.pow(2, zoom);
			  },

			  zoom: function(scale) {
				return Math.log(scale) / Math.LN2;
			  },

			  distance: function(latlng1, latlng2) {
				var dx = latlng2.lng - latlng1.lng,
				  dy = latlng2.lat - latlng1.lat;

				return Math.sqrt(dx * dx + dy * dy);
			  },
			  infinite: true
			});
			
			L.Control.RoCScale = L.Control.Scale.extend({
				_updateMetric: function (maxKilometers) {
					var kilometers = this._getRoundNum(maxKilometers);
					this._updateScale(this._mScale, kilometers + " km", kilometers / maxKilometers);
				}
			});
			
			L.Control.Measure.prototype._formatDistance = function(val) {
				if (typeof this.options.formatDistance === 'function') {
					return this.options.formatDistance(val);
				}
				return Math.round(val);
			}
		 
			map = L.map('map', {                                                       
				//crs: L.CRS.pr,
				crs: L.CRS.Simple,
				center: mapcenter,
				zoomControl:false,
				continuousWorld: false,
				attributionControl: false, 
				autoPan : true,
				noWrap: true,
				maxZoom: 0,                                                     
				minZoom: -4
			});  
	
			map.getContainer().style.cursor = 'crosshair';
			map.on('mousemove', function(e) {
				//console.log(e.latlng.lat + ' ' + e.latlng.lng);
			});
			var bounds = [xy(0, 0), xy(width_km, height_km)];
			var image = L.imageOverlay(image_url, bounds);
			image.addTo(map);
			map.fitBounds(bounds);
			
			var hash = new L.Hash(map);
			
			
			new L.Control.RoCGraphicScale({fill: 'fill', unitsPer1000px: 4, scaleUnit: ' km'}).addTo(map);
			
			//new L.Control.RoCScale({imperial: false, metric: true, position: 'bottomleft'}).addTo(map);
			//new L.Control.Zoom({ position: 'bottomleft' }).addTo(map);
			var measureControl = new L.Control.Measure({ position: 'topleft' }).addTo(map);
			
			map.setMaxBounds(bounds);
			map.on('drag', function() {
				map.panInsideBounds(bounds, { animate: false });
			});
			//var bounds = [xy(0, 0), xy(18432, 16384)]
			

			// add pois
			//var hobbiton = xy(776, 1648.88)
			//var minasMorgul = xy(2013, 684.86)

			//L.marker(hobbiton).addTo(map).bindPopup('Hobbiton')
			//L.marker(minasMorgul).addTo(map).bindPopup('Minas Morgul')
			// var travel = L.polyline([hobbiton, minasMorgul])
			// travel.addTo(map)
			
			

			//map.on('contextmenu', function (event) {
			   //console.log('Coordinates: ' + event.latlng.toString())
			   //L.marker(event.latlng).addTo(map).bindPopup('Coordinates: ' + event.latlng.toString())
			//});
			
			//document.getElementById('map').style.cursor = 'crosshair';
			
		 </script>
    </body>
</html>
