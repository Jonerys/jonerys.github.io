<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Прототип</title>
		<link rel="stylesheet" type="text/css" href="style/leaflet.css" />
		<link rel="stylesheet" type="text/css" href="style/map.css" />
        <script src="js/leaflet.js" type="text/javascript"></script>
		<script src="js/leaflet-hash.js" type="text/javascript"></script>
		<script src="js/leaflet.measure.js" type="text/javascript"></script>
    </head>
    <body>
		 <div id="map"></div>
		 <script>
			
			L.CRS.pr = L.extend({}, L.CRS.Simple, {
			  projection: L.Projection.LonLat,
			  transformation: new L.Transformation(1/1000, 0, 1/1000, 0),
			  scale: function(zoom) {
				return Math.pow(2, zoom);
			  },

			  zoom: function(scale) {
				return Math.log(scale) / Math.LN2;
			  },

			  distance: function(latlng1, latlng2) {
				var dx = latlng2.lng - latlng1.lng,
				  dy = latlng2.lat - latlng1.lat;

				return Math.sqrt(dx * dx + dy * dy);
			  },
			  infinite: true
			});
		 
			map = L.map('map', {                                                       
				//crs: L.CRS.Simple,
				crs: L.CRS.pr,
				//center: [2400, 2050],
				zoomControl:false,
				continuousWorld: false,
				attributionControl: false, 
				//autoPan : true,
				noWrap: true,
				maxZoom: 10,                                                     
				minZoom: 6                                                      
			});                                    
			
			var hash = new L.Hash(map);

			var yx = L.latLng

			var xy = function (x, y) {
			  if (L.Util.isArray(x)) { // When doing xy([x, y]);
				return yx(x[1], x[0])
			  }
			  return yx(y, x) // When doing xy(x, y);
			}
			var bounds = [xy(0, 0), xy(18432, 16384)]
			var image = L.imageOverlay('./images/3.png', bounds)
			image.addTo(map)

			// add pois
			//var hobbiton = xy(776, 1648.88)
			//var minasMorgul = xy(2013, 684.86)

			//L.marker(hobbiton).addTo(map).bindPopup('Hobbiton')
			//L.marker(minasMorgul).addTo(map).bindPopup('Minas Morgul')
			// var travel = L.polyline([hobbiton, minasMorgul])
			// travel.addTo(map)

			map.fitBounds(bounds)

			// calculate Euclidean distance:
			var getDistance = function (pointA, pointB) {
			  var xA = pointA.lng
			  var yA = pointA.lat
			  var xB = pointB.lng
			  var yB = pointB.lat

			  var distance = Math.sqrt(Math.pow((xB - xA), 2) + Math.pow((yB - yA), 2))
			  return distance
			}
			//console.log('getDistance(hobbiton, minasMorgul): ' + getDistance(hobbiton, minasMorgul) + 'km')
			
			
			L.Control.Scale.prototype._updateMetric = function (maxMeters) {
				var meters = this._getRoundNum(maxMeters),
					label = meters + ' km';
					

				this._updateScale(this._mScale, label, meters / maxMeters);
			};
			var myScaleControl = L.control.scale({imperial: false, metric: true, position: 'bottomleft'}).addTo(map);
			
			new L.Control.Zoom({ position: 'bottomleft' }).addTo(map);
			
			map.setMaxBounds(bounds);
			map.on('drag', function() {
				map.panInsideBounds(bounds, { animate: false });
			});
			
			

			// map.on('contextmenu', function (event) {
			//   console.log('Coordinates: ' + event.latlng.toString())
			//   L.marker(event.latlng).addTo(map).bindPopup('Coordinates: ' + event.latlng.toString())
			// })

  
			
		 </script>
    </body>
</html>
