<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Прототип</title>
		<link rel="stylesheet" type="text/css" href="style/leaflet.css" />
		<link rel="stylesheet" type="text/css" href="style/map.css" />
        <script src="js/leaflet.js" type="text/javascript"></script>
		<script src="js/leaflet-hash.js" type="text/javascript"></script>
		<script src="js/leaflet.measure.js" type="text/javascript"></script>
    </head>
    <body>
		 <div id="map"></div>
		 <script>
			map = L.map('map', {                                                       
				crs: L.CRS.Simple,
				//center: [2400, 2050],
				zoomControl:false,
				continuousWorld: false,
				attributionControl: false, 
				autoPan : true,
				noWrap: true,
				zoomSnap: 0.5,
				maxZoom: 3,                                                     
				minZoom: 1                                                      
			});
			map.setView([-200, 100], 2);                                      
			
			var hash = new L.Hash(map);
			
			//var southWest = map.unproject([0, 4096], map.getMaxZoom());
			//var northEast = map.unproject([4608, 0], map.getMaxZoom());
			var southWest = map.unproject([0, 4100], map.getMaxZoom());
			var northEast = map.unproject([4800, 0], map.getMaxZoom());
			var bounds = new L.LatLngBounds(southWest, northEast);
			
			var positron = L.tileLayer('./map_tiles/{z}/{y}/{x}.png', {
				bounds: bounds,
				tileSize: 100
			}).addTo(map); 
			
			map.setMaxBounds(bounds);
			map.on('drag', function() {
				map.panInsideBounds(bounds, { animate: false });
			});
			
			new L.control.scale({imperial: false, metric: true, position: 'bottomleft'}).addTo(map);
			new L.Control.Zoom({ position: 'bottomleft' }).addTo(map);
			
			function pointToLayer(feature, latlng) {
			var newLatLng = map.unproject([latlng.lng, latlng.lat], map.getMaxZoom());
			return new L.marker(newLatLng, {
				icon : L.icon({
					iconUrl: 'markers/marker_1.png',
					iconSize: [24, 24],
					iconAnchor: [12, 24],
					popupAnchor: [0, -16]
				}),
				riseOnHover: true,
				className: feature.properties.cat
				});
			};
			
			var countries = {
				"type": "FeatureCollection",
				"features": [{
					"type": "Feature",
					"geometry": {
						"type": "Point",
						"coordinates": [2286, 2370]
					},
					"properties": {
						"name": "Винтерфелл",
						"english": "Winterfell",
						"synonym": "",
						"cat": "castle",
						"loyal": "Старки, Болтоны",
						"url": "Винтерфелл",
						"description": "Родовой замок Старков, заложен Брандоном Строителем в Век Героев. Один из старейших замков Семи королевств."
					}
				}]};
			
			var countryLayer = new L.GeoJSON(countries.features, {
				pointToLayer: pointToLayer//,
				//onEachFeature: onEachFeature
				//filter: function(feature, layer) {return feature.properties.cat == "castle";}
			});
			
			var geodata = L.layerGroup([
				countryLayer
				])
			.addTo(map);
			
			//new L.control.measure({
			//	formatDistance: function (val) {
			//	return Math.round(400 * val / 36);
			//	}
			//}).addTo(map)
		 </script>
    </body>
</html>
